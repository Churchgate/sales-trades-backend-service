[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Run Alembic migrations before starting the server on every deploy.
# Alembic is idempotent — already-applied migrations are skipped safely.
startCommand = "uv run alembic upgrade head && uv run fastapi run app/main.py --host 0.0.0.0 --port $PORT"
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
