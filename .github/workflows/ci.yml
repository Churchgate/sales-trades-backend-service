name: CI

on:
  push:
    branches: [main, staging, development]
  pull_request:

env:
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/churchgate_dashboard
  TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/churchgate_dashboard_test
  JWT_SECRET: ci-test-secret
  SESSION_SECRET: ci-test-secret

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: churchgate_dashboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Create test database
        run: PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE churchgate_dashboard_test"

      - name: Lint (ruff)
        run: uv run ruff check app tests

      - name: Type check (ty)
        run: uv run ty check app
        continue-on-error: true

      - name: Run migrations (dev + test DB)
        run: |
          uv run alembic upgrade head
          DATABASE_URL=$TEST_DATABASE_URL uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest -q

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
